<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけんゲーム</title>
    
    <!--
    まずはじゃんけんゲームに必要な工程をリストアップしましょう
    1. ユーザーがじゃんけんの手を選ぶ
    2. コンピューターがランダムでじゃんけんの手を選ぶ
    3. コンピューターの手をランダムで表示する
    4. ユーザーとコンピューターの手を比較して勝敗を決める
    5. 勝敗の結果を表示する
    6. ユーザーがもう一度手を選ぶともう一度遊べる
    9. ゲーム終了ボタンを押したとき時に、ユーザーの勝敗の統計を表示する
    10. ユーザーが統計をリセットするかどうかを選ぶ
    11. ユーザーが統計をリセットする場合は、統計を初期化する
    -->

    <style>
        /* //CSSのスタイルをここに記述する */
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background-color: #f0f0f0;
    }
    p {
        font-size: 1.2em;
    }
    img {
        width: 50px;
        height: 50px;
    }
    button {
        margin: 10px;
        padding: 10px 20px;
        font-size: 1em;
        cursor: pointer;
    }


    </style>
</head>
<body>

    <!-- 1.ユーザーがじゃんけんの手を選ぶ
      画像/gu.png,画像/choki.png,画像/pa,png -->
     <div>
        <h1>じゃんけんゲーム</h1>
        <p>じゃんけんの手を選んでください</p>
        <button id="rock"><img src="画像/gu.png" alt="">グー</button>
        <button id="paper"><img src="画像/pa.png" alt="">パー</button>
        <button id="scissors"><img src="画像/ch.png" alt="">チョキ</button>
    </div>

    <div>
        <h2>あなたの手</h2>
        <p id="user-hand"></p>
    </div>


    <!-- 2.コンピューターがランダムでじゃんけんの手を選ぶ -->
     <div>
        <h2>コンピューターの手</h2>
        <p id="computer-hand"></p>
    </div>
    <script>
        //コンピューターでランダムにじゃんけんの手を選ぶ
        //ユーザーが手を選んだ後に、コンピューターがランダムで決定する
        const hands = ["グー", "チョキ", "パー"];
        document.getElementById("rock").addEventListener("click", function() {
            playGame("グー");
        });
        document.getElementById("paper").addEventListener("click", function() {
            playGame("パー");
        });
        document.getElementById("scissors").addEventListener("click", function() {
            playGame("チョキ");
        });

        //ゲームの処理
        const stats = {
            userWins: 0,
            computerWins: 0,
            draws: 0
        };

        function playGame(userHand) {
            //ユーザーの手をhtmlで表示する
            const userHandElement = document.getElementById("user-hand");
            if (userHand === "グー") {
                userHandElement.innerHTML = '<img src="画像/gu.png" alt="">グー';
            } else if (userHand === "チョキ") {
                userHandElement.innerHTML = '<img src="画像/ch.png" alt="">チョキ';
            } else {
                userHandElement.innerHTML = '<img src="画像/pa.png" alt="">パー';
            }

            //コンピューターの手をランダムで決定する
            const computerHand = hands[Math.floor(Math.random() * hands.length)];
            //コンピューターの手を結果を表示する前に画像で表示する
            const computerHandElement = document.getElementById("computer-hand");
            if (computerHand === "グー") {
                computerHandElement.innerHTML = '<img src="画像/gu.png" alt="">グー';
            } else if (computerHand === "チョキ") {
                computerHandElement.innerHTML = '<img src="画像/ch.png" alt="">チョキ';
            } else {
                computerHandElement.innerHTML = '<img src="画像/pa.png" alt="">パー';
            }
            // 3.ユーザーとコンピューターの手を比較して勝敗を決める
            //勝敗の判定
            let result;
            if (userHand === computerHand) {
                result = "引き分け";
                stats.draws++;
            } else if (
                (userHand === "グー" && computerHand === "チョキ") ||
                (userHand === "チョキ" && computerHand === "パー") ||
                (userHand === "パー" && computerHand === "グー")
            ) {
                result = "あなたの勝ち";
                stats.userWins++;
            } else {
                result = "コンピューターの勝ち";
                stats.computerWins++;
            }
            // 4.勝敗の結果をアラートではなくhtml上で表示する
            //コンピューターの手の画像+勝敗を表示する
            const resultElement = document.createElement("p");
            resultElement.textContent = `結果: ${result}`;
            computerHandElement.appendChild(resultElement);



            // 5.ユーザーがもう一度手を選ぶともう一度遊べる
            //画像をクリックするたびに、統計を更新するようにする
            //ここでは簡単に統計を更新するために、勝敗の結果を表示するたびに、統計を更新するようにする
            const statsElement = document.createElement("p");
            statsElement.textContent = `統計\nあなたの勝ち: ${stats.userWins}回\nコンピューターの勝ち: ${stats.computerWins}回\n引き分け: ${stats.draws}回`;
            computerHandElement.appendChild(statsElement)

            // 7.ユーザーが統計をリセットするかどうかを選ぶ
            //リセットボタンを押すと、統計を初期化し、上記の統計を表示する
            const resetButton = document.createElement("button");
            resetButton.textContent = "統計をリセットする";
            resetButton.addEventListener("click", function() {
                stats.userWins = 0;
                stats.computerWins = 0;
                stats.draws = 0;
                statsElement.textContent = `統計\nあなたの勝ち: ${stats.userWins}回\nコンピューターの勝ち: ${stats.computerWins}回\n引き分け: ${stats.draws}回`;
            });
            computerHandElement.appendChild(resetButton);



        }


    </script>


</body>
</html>
