<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>じゃんけんゲーム</title>
    <!-- 
        まずはじゃんけんゲームを作るのに必要な工程をリストアップします。
        １．ユーザーが手を選ぶ（グー、チョキ、パー）
        ２．コンピュータが手を選ぶ（グー、チョキ、パー）
        ３．勝敗を判定する
        ４．結果を表示する
        ５．もう一度プレイするかどうかを選ぶ
        ６．ゲームを終了する
    -->
</head>
<!--明るいブルーベースのデザインを付けます -->
 <style>
    body {
        font-family: Arial, sans-serif;
        background-color: #e0f7fa;
        text-align: center;
        padding: 20px;
    }
    h2 {
        color: #00796b;
    }
    button {
        background-color: #00796b;
        color: white;
        border: none;
        padding: 10px 20px;
        margin: 10px;
        cursor: pointer;
        border-radius: 5px;
    }
    button:hover {
        background-color: #004d40;
    }
    img {
        width: 50px;
        height: 50px;
    }


 </style>
<body>
    <!-- 
    １．ユーザーが手を選ぶ
    画像/gu.png、画像/ch.png、画像/pa.pngを用意して、ボタンを作成します。
    idの名前はローマ字で統一する。guu、choki、paaとする。
    -->
    <div id="userChoice">
        <h2>あなたの手を選んでください</h2>
        <button id="guu"><img src="画像/gu.png" alt="グー"></button>
        <button id="choki"><img src="画像/ch.png" alt="チョキ"></button>
        <button id="paa"><img src="画像/pa.png" alt="パー"></button>
    </div>
    <!-- 
        2. コンピュータが手を選ぶ
        コンピュータの手はランダムで決定します。
    -->
    <div id="computerChoice">
        <h2>コンピュータの手</h2>
        <p id="computerHand">まだ選ばれていません</p>
    </div>
    <!-- 結果をテキストで表示する -->
    <div id="result">
        <h2>結果</h2>
        <p id="resultText">まだ結果は出ていません</p>
    </div>
    <!-- 現在の勝敗数 -->
    <div id="score">
        <h2>勝敗数</h2>
        <p id="userScore">あなたの勝ち: 0</p>
        <p id="computerScore">コンピュータの勝ち: 0</p>
        <p id="drawScore">引き分け: 0</p>
    </div>

    <script>
        // １．ユーザーが手をイランだ時のクリックイベント
        document.getElementById("guu").addEventListener("click", function() {
            playGame("グー");
        });
        document.getElementById("choki").addEventListener("click", function() {
            playGame("チョキ");
        });
        document.getElementById("paa").addEventListener("click", function() {
            playGame("パー");
        });

        //2. コンピュータがランダムで手を選ぶ。
        // ※ユーザーが手を選んだ後にコンピュータの手を決定するようにする。
        // ※画像/gu.png、画像/ch.png、画像/pa.pngを使って、コンピュータがどの手を選んだのかわかりやすくする。
        // idの名前はローマ字で統一する。guu、choki、paaとする。
        // コンピュータがランダムで手を選ぶ関数
        function getComputerHand() {
            const hands = ["グー", "チョキ", "パー"];
            const randomIndex = Math.floor(Math.random() * hands.length);
            return hands[randomIndex];
        }
        // 勝敗を判定する関数
        // 結果をreaultTextに表示する。
        function determineWinner(userHand, computerHand) {
            if (userHand === computerHand) {
                return "引き分けです！";
            } else if (
                (userHand === "グー" && computerHand === "チョキ") ||
                (userHand === "チョキ" && computerHand === "パー") ||
                (userHand === "パー" && computerHand === "グー")
            ) {
                return "あなたの勝ちです！";
            } else {
                return "コンピュータの勝ちです！";
            }
        }
        // ゲームをプレイする関数
        function playGame(userHand) {
            const computerHand = getComputerHand();
            document.getElementById("computerHand").textContent = computerHand;
            const result = determineWinner(userHand, computerHand);
            document.getElementById("resultText").textContent = result;
            updateScore(result);
        }
        // 勝敗数を更新する関数
        let userWins = 0;
        let computerWins = 0;
        let draws = 0;
        function updateScore(result) {
            if (result === "あなたの勝ちです！") {
                userWins++;
                document.getElementById("userScore").textContent = "あなたの勝ち: " + userWins;
            } else if (result === "コンピュータの勝ちです！") {
                computerWins++;
                document.getElementById("computerScore").textContent = "コンピュータの勝ち: " + computerWins;
            } else {
                draws++;
                document.getElementById("drawScore").textContent = "引き分け: " + draws;
            }
        }


    </script>
</body>
</html>
