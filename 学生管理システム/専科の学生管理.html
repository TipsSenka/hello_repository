    <script>
        /**
         * 学生データを表示する関数
         */
        function displayStudents(students) {
            // 学生データを表示するテーブルのtbody要素を取得
            const studentList = document.getElementById("student-list");
            // 既存の学生データをクリア
            studentList.innerHTML = "";
            // 学生データが空の場合の処理
            if (students.length === 0) {
                const row = document.createElement("tr");
                row.innerHTML = `<td colspan="3">学生データがありません。</td>`;
                studentList.appendChild(row);
                return;
            }
            // 学生データをテーブルに追加
            students.forEach(student => {
                // 学生データの行を作成
                const row = document.createElement("tr");
                row.innerHTML = `
                    <td>${student.name}</td>
                    <td>${student.id}</td>
                    <td>${student.email}</td>
                `;
                studentList.appendChild(row);
            });
        }

        /**
         * 外部JSONから学生データを読み込んで表示
         */
        async function loadStudents() {
            try {
                const response = await fetch("students.json");
                if (!response.ok) {
                    throw new Error("学生データの読み込みに失敗しました。");
                }

                const students = await response.json();
                displayStudents(students);
            } catch (error) {
                const studentList = document.getElementById("student-list");
                const row = document.createElement("tr");
                row.innerHTML = `<td colspan="3">${error.message}</td>`;
                studentList.appendChild(row);
            }
        }
    </script>

<body>
    <h1>学生一覧</h1>
    <!-- 学生データをテーブルに表示する -->
    <table border="1">
        <thead>
            <tr>
                <!-- 列名でソート順指定できるようにする  -->
                <th><a href="#" onclick="sortStudents('name')">氏名</a></th>
                <th><a href="#" onclick="sortStudents('id')">学籍番号</a></th>
                <th><a href="#" onclick="sortStudents('email')">メールアドレス</a></th>
            </tr>
        </thead>
        <script>
            /**
             * 学生データを指定されたプロパティでソートする関数
             * @param {string} property - ソートするプロパティ名
             */
            function sortStudents(property) {
                // ソートロジックを実装
                // ここでは、学生データを取得して、指定されたプロパティでソートし、再度表示する処理を行う。
                loadStudents(); // まずは学生データを読み込む
                // その後、ソート処理を行う
                // 例: students.sort((a, b) => a[property].localeCompare(b[property]));
                // ソート後の学生データを表示する
                displayStudents(students);
            }
            
            // 学生データを読み込む関数を呼び出す
            loadStudents();
            // ソート処理を行う関数を定義する
            function sortStudents(property) {
                // 学生データを取得する
                fetch("students.json")
                    .then(response => response.json())
                    .then(students => {
                        // 指定されたプロパティでソートする
                        students.sort((a, b) => a[property].localeCompare(b[property]));
                        // ソート後の学生データを表示する
                        displayStudents(students);
                    })
                    .catch(error => {
                        const studentList = document.getElementById("student-list");
                        const row = document.createElement("tr");
                        row.innerHTML = `<td colspan="3">学生データの読み込みに失敗しました。</td>`;
                        studentList.appendChild(row);
                    });
            }
        </script>
        <tbody id="student-list">
        </tbody>
    </table>
    <script>
        loadStudents();
    </script>
</body>
